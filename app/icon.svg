<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Orange background with slight rounding -->
  <rect width="32" height="32" rx="5" fill="#ff6600"/>
  <!-- Outer radar ring -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="white" stroke-width="1.2" opacity="0.45"/>
  <!-- Mid radar ring -->
  <circle cx="16" cy="16" r="7.5" fill="none" stroke="white" stroke-width="1.2" opacity="0.65"/>
  <!-- Inner radar ring -->
  <circle cx="16" cy="16" r="3.8" fill="none" stroke="white" stroke-width="1.2" opacity="0.85"/>
  <!-- Sweep line (top-right direction — "looking up") -->
  <line x1="16" y1="16" x2="25.5" y2="7.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.2" fill="white"/>
</svg>
